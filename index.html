<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Blackjack</title>

        <style>
            body, #game {
                display: flex;
                flex-direction: column;
                align-items: center;
                min-height: 100vh;
                margin: 0;
            }

            #cards {
                position: relative;
                right: 90px;
            }

            #deck {
                position:absolute;
            }

            #back_card {
                position:absolute;
                width: 180px;
            }

            #button_container button {
                width: 100px;
                height: 40px;
            }

            #hit_stay {
                display: none;
            }
          </style>

        <script>
            if ('caches' in window) {
                // Cache API is supported
                console.log("True");

                caches.open("cards-cache").then(function(cache) {
                    // Cache opened successfully
                    console.log("Cache created");

                    cache
                        .add("/cards/back.png")
                        .then(() => console.log("Data added to cache."))
                        .catch((error) => console.log("Error adding data to cache: ", error))

                }).catch(function(error) {
                    // Failed to open cache
                    console.log("Cache failed");
                });
            
                // You can add your code here
                
            } else {
                // Cache API is not supported
                console.log("False");
            }
        </script>

        <script>
            caches.open("cards-cache").then(function (cache) {
                cache.match("/cards/back.png").then(function (response) {
                    if (response) {
                        // Resource found in cache
                        document.getElementById("deck").src = response.url;
                        console.log(response.url);
                    } else {
                        // Resource not found in cache
                    }
                })
            }) 
        </script>
    </head>

    <body>
        <h1 id="title">Blackjack</h1>
        <h4>By Rafal Zacher</h4>

        <div id="game">
            <div id="cards" style="height: 250px;">
                <img id="deck" style="width: 180px;">
                <!-- <img id="back_card" src="/cards/back.png"> -->
            </div>

            <div id="player_hand">
                <img id="card_1" src style="width: 180px;">
                <img id="card_2" src style="width: 180px;">
                <img id="card_3" src style="width: 180px;">
                <img id="card_4" src style="width: 180px;">
                <img id="card_5" src style="width: 180px;">
            </div>

            <p id="text-area">Welcome to Blackjack!</p>

            <div id="button_container">
                <button id="new-game-button">New Game!</button>

                <div id="hit_stay">
                    <button id="hit-button">Hit!</button>
                    <button id="stay-button">Stay</button>
                </div>
            </div>
        </div>

        <script type="application/x-javascript"
            src="./scripts/main.js"></script>
        <script type="application/x-javascript"
            src="./scripts/clear_cards.js"></script>
        <script type="application/x-javascript"
            src="./scripts/create_deck.js"></script>
        <script type="application/x-javascript"
            src="./scripts/show_status.js"></script>
        <script type="application/x-javascript"
            src="./scripts/shuffle_deck.js"></script>
        <script type="application/x-javascript"
            src="./scripts/get_next_card.js"></script>
        <script type="application/x-javascript"
            src="./scripts/get_card_string.js"></script>
        <script type="application/x-javascript"
            src="./scripts/update_scores.js"></script>
        <script type="application/x-javascript"
            src="./scripts/get_score.js"></script>
        <script type="application/x-javascript"
            src="./scripts/get_card_numeric_value.js"></script>
        <script type="application/x-javascript"
            src="./scripts/check_for_end_of_game.js"></script>
    </body>
</html>
